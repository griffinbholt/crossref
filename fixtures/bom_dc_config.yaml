# Book of Mormon vs. Doctrine & Covenants
# Run: crossref fixtures/bom_dc_config.yaml --output results/bom_dc.h5

documents1:
  - pathname: ~/crossref/fixtures/documents/bookofmormon.md
    splitter: line
    title: Book of Mormon

documents2:
  - pathname: ~/crossref/fixtures/documents/doctrineandcovenants.md
    splitter: line
    title: Doctrine and Covenants

preprocessing:
  - replace_punctuation:
      - ['\u2018', "'"]  # left single quote → apostrophe
      - ['\u2019', "'"]  # right single quote → apostrophe
      - ['—', ' ']       # em-dash → space
      - ['–', ' ']       # en-dash → space
  - normalize_text: true
  - remove_extra_spaces: true

metrics:
  # N-gram: D&C quotes both the BoM and KJV extensively, so shared phrases are often
  # intentional. Filter only universal filler, not meaningful doctrinal phrases.
  - name: ngram
    n_min: 2
    n_max: 10
    custom_stopphrases:
      # Archaic words not in NLTK that dominate both corpora
      - "yea"
      - "behold"
      - "unto"
      - "thee"
      - "thy"
      - "thou"
      - "ye"
      - "hath"
      - "saith"
      - "verily"
      # BoM filler phrases (no signal in cross-document context)
      - "came to pass"
      - "it came to pass"
      - "and it came to pass"
      - "and it came to pass that"
      - "it came to pass that"
      - "came to pass that"

  # Semantic: D&C has strong thematic and doctrinal links to BoM;
  # semantic similarity catches paraphrase and conceptual parallels.
  - name: sentencetransformer
    modelname: all-mpnet-base-v2
    similarity_fn: cosine
